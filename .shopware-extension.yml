compatibility_date: "2026-02-11"
store:
    availabilities:
        - German
        - International
    default_locale: en_GB
    localizations:
        - de_DE
        - en_GB
    categories:
        - Administration
    type: extension
    icon: src/Resources/store/icon.png
    automatic_bugfix_version_compatibility: true
    meta_title:
        de: Shopmon Connector - Zentrales Shop-Monitoring
        en: Shopmon Connector - Centralized Shop Monitoring
    meta_description:
        de: Verbinde deinen Shopware-Shop mit Shopmon für zentrales Monitoring aller Instanzen. Automatische Integration mit sicheren Zugangsdaten. Überwache Versionen, Scheduled Tasks und Performa
        en: Connect your Shopware shop to Shopmon for centralized monitoring of all your instances. Automatic integration with secure credentials. Monitor versions, scheduled tasks and performance.
    description:
        de: file:src/Resources/store/description.de.html
        en: file:src/Resources/store/description.en.html
    installation_manual:
        de: file:src/Resources/store/installation_manual.de.html
        en: file:src/Resources/store/installation_manual.en.html
    tags:
        de:
            - Monitoring
            - Überwachung
            - dashboard
            - Multi-Shop
        en:
            - monitoring
            - dashboard
            - Multi-Shop
            - Health check
    videos:
        de: []
        en: []
    highlights:
        de:
            - Automatische Integration mit Shopmon
            - Zentrale Überwachung aller Shops
            - Sichere Zugangsdaten-Generierung
        en:
            - Automatic integration with Shopmon
            - Centralized monitoring of all shops
            - Secure credential generation
    features:
        de:
            - Automatische Erstellung einer Integration mit minimalen Berechtigungen
            - Base64-kodierte Zugangsdaten für einfache Konfiguration
            - Unterstützung für FroshTools Health-Checks
            - Cache-Verwaltung über Shopmon
            - Scheduled Task Monitoring
            - Plugin- und App-Übersicht
        en:
            - Automatic creation of integration with minimal permissions
            - Base64-encoded credentials for easy configuration
            - Support for FroshTools health checks
            - Cache management via Shopmon
            - Scheduled task monitoring
            - Plugin and app overview
    faq:
        de: []
        en: []
    image_directory: src/Resources/store/images
build:
    zip:
        composer:
            enabled: true
        assets:
            enabled: true
            enable_es_build_for_admin: false
            enable_es_build_for_storefront: false
            disable_sass: false
            npm_strict: false
changelog:
    enabled: true
